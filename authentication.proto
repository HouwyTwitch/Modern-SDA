syntax = "proto3";

package steam;

// ==================== Enums ====================

enum EAuthTokenPlatformType {
  k_EAuthTokenPlatformType_Unknown = 0;
  k_EAuthTokenPlatformType_SteamClient = 1;
  k_EAuthTokenPlatformType_WebBrowser = 2;
  k_EAuthTokenPlatformType_MobileApp = 3;
}

enum ESessionPersistence {
  k_ESessionPersistence_Persistent = 0;
  k_ESessionPersistence_Temporary = 1;
}

// ==================== Device / QR Request ====================

message CAuthentication_DeviceDetails {
  string device_friendly_name = 1;
  EAuthTokenPlatformType platform_type = 2;
  int32 os_type = 3;
  uint32 gaming_device_type = 4;
  uint32 client_count = 5;
  bytes machine_id = 6;
  int32 app_type = 7;
}

message CAuthentication_BeginAuthSessionViaQR_Request {
  string device_friendly_name = 1;
  EAuthTokenPlatformType platform_type = 2;
  CAuthentication_DeviceDetails device_details = 3;
  string website_id = 4;
}

message CAuthentication_BeginAuthSessionViaQR_Response {
  int32 result = 1;
  bytes client_id = 2;
  bytes request_id = 3;
  string challenge_url = 4;
}

// ==================== Mobile Confirmation ====================

message CAuthentication_UpdateAuthSessionWithMobileConfirmation_Request {
  int32 version = 1;
  uint64 client_id = 2;
  fixed64 steamid = 3;
  bytes signature = 4;
  bool confirm = 5;
  ESessionPersistence persistence = 6;
}

message CAuthentication_UpdateAuthSessionWithMobileConfirmation_Response {
  int32 result = 1;
}
