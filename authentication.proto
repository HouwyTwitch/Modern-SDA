syntax = "proto3";

package steam;

// ==================== Enums ====================

enum EAuthTokenPlatformType {
  k_EAuthTokenPlatformType_Unknown = 0;
  k_EAuthTokenPlatformType_SteamClient = 1;
  k_EAuthTokenPlatformType_WebBrowser = 2;
  k_EAuthTokenPlatformType_MobileApp = 3;
}

enum ESessionPersistence {
  k_ESessionPersistence_Persistent = 0;
  k_ESessionPersistence_Temporary = 1;
}

// ==================== Device / QR Request ====================

message CAuthentication_DeviceDetails {
  string device_friendly_name = 1;
  EAuthTokenPlatformType platform_type = 2;
  int32 os_type = 3;
  uint32 gaming_device_type = 4;
  uint32 client_count = 5;
  bytes machine_id = 6;
  int32 app_type = 7;
}

message CAuthentication_BeginAuthSessionViaQR_Request {
  string device_friendly_name = 1;
  EAuthTokenPlatformType platform_type = 2;
  CAuthentication_DeviceDetails device_details = 3;
  string website_id = 4;
}

message CAuthentication_BeginAuthSessionViaQR_Response {
  int32 result = 1;
  bytes client_id = 2;
  bytes request_id = 3;
  string challenge_url = 4;
}

// ==================== Credentials Auth ====================

message CAuthentication_BeginAuthSessionViaCredentials_Request {
  string account_name = 1;
  string encrypted_password = 2;
  uint64 encryption_timestamp = 3;
  bool remember_login = 4;
  ESessionPersistence persistence = 5;
  string website_id = 6;
  CAuthentication_DeviceDetails device_details = 7;
  string guard_data = 8;
}

message CAuthentication_BeginAuthSessionViaCredentials_Response {
  uint64 client_id = 1;
  bytes request_id = 2;
  float interval = 3;
  uint64 steamid = 5;
  string weak_token = 6;
}

// ==================== Poll Auth Session ====================

message CAuthentication_PollAuthSessionStatus_Request {
  uint64 client_id = 1;
  bytes request_id = 2;
  uint64 token_to_revoke = 3;
}

message CAuthentication_PollAuthSessionStatus_Response {
  uint64 new_client_id = 1;
  bytes new_request_id = 2;
  string access_token = 3;
  string refresh_token = 4;
  string account_name = 5;
  string new_guard_data = 6;
  bool had_remote_interaction = 7;
}

// ==================== Mobile Confirmation ====================

message CAuthentication_UpdateAuthSessionWithMobileConfirmation_Request {
  int32 version = 1;
  uint64 client_id = 2;
  fixed64 steamid = 3;
  bytes signature = 4;
  bool confirm = 5;
  ESessionPersistence persistence = 6;
}

message CAuthentication_UpdateAuthSessionWithMobileConfirmation_Response {
  int32 result = 1;
}
